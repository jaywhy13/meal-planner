<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page With Excessive Requests</title>
  <script>
    // Floods a single endpoint repeatedly, simulating the motivating bug:
    // an Axios interceptor retrying a 401 response in an infinite loop.
    let requestCount = 0;
    function floodEndpoint() {
      if (requestCount >= 50) return;
      requestCount++;
      fetch('/api/auth/token/refresh', { method: 'POST' })
        .catch(() => {})
        .finally(() => setTimeout(floodEndpoint, 10));
    }
    document.addEventListener('DOMContentLoaded', floodEndpoint);
  </script>
</head>
<body>
  <h1>Excessive Requests Page</h1>
  <p>This page floods /api/auth/token/refresh to simulate excessive requests to one endpoint.</p>
</body>
</html>
